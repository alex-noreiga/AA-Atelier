kind = "web"
previewPath = "/"
title = "Order Status"
version = "1.0.0"
id = "artifacts/order-status"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25946

[services.development]
run = "pnpm --filter @workspace/order-status run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/order-status", "run", "build" ]
publicDir = "artifacts/order-status/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25946"
BASE_PATH = "/"
