openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: orders
    description: Customer order status lookup
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /orders/{orderNumber}:
    get:
      operationId: getOrderStatus
      tags: [orders]
      summary: Get order status
      description: Look up a customer's dress order status by order number
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStatus"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderNotFound"
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Submit a new custom dress order
      description: Creates a new custom dress order and saves it to Notion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewOrderRequest"
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewOrderResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OrderStatus:
      type: object
      properties:
        orderNumber:
          type: string
        orderName:
          type: string
        currentStage:
          type: string
        stages:
          type: array
          items:
            type: string
      required:
        - orderNumber
        - orderName
        - currentStage
        - stages
    OrderNotFound:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    NewOrderRequest:
      type: object
      required:
        - fullName
        - email
        - phone
        - preferredContact
        - waist
        - bust
        - hips
        - height
        - bodyGirth
        - measurementUnit
      properties:
        fullName:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 1
        preferredContact:
          type: string
          enum: [email, phone, text]
        waist:
          type: number
          minimum: 0
        bust:
          type: number
          minimum: 0
        hips:
          type: number
          minimum: 0
        height:
          type: number
          minimum: 0
        bodyGirth:
          type: number
          minimum: 0
        measurementUnit:
          type: string
          enum: [inches, cm]
        description:
          type: string
        neededBy:
          type: string
          format: date
    NewOrderResponse:
      type: object
      required:
        - orderNumber
      properties:
        orderNumber:
          type: string
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
