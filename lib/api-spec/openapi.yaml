openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: orders
    description: Customer order status lookup
  - name: contact
    description: Customer contact messages
  - name: products
    description: Shop inventory (ready-to-ship items)
paths:
  /health:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /orders/{orderNumber}:
    get:
      operationId: getOrderStatus
      tags: [orders]
      summary: Get order status
      description: Look up a customer's dress order status by order number
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStatus"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderNotFound"
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Submit a new custom dress order
      description: Creates a new custom dress order and saves it to Notion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewOrderRequest"
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewOrderResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /contact:
    post:
      operationId: createContactMessage
      tags: [contact]
      summary: Submit a contact message
      description: Saves a customer inquiry to the Notion contact-messages database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewContactRequest"
      responses:
        "201":
          description: Message received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewContactResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: List shop products
      description: >-
        Returns published, in-stock shop items from the Notion inventory
        database, grouped into cards with selectable variants.
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OrderStatus:
      type: object
      properties:
        orderNumber:
          type: string
        orderName:
          type: string
        currentStage:
          type: string
        stages:
          type: array
          items:
            type: string
      required:
        - orderNumber
        - orderName
        - currentStage
        - stages
    OrderNotFound:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    NewOrderRequest:
      type: object
      required:
        - fullName
        - email
        - phone
        - preferredContact
        - waist
        - bust
        - hips
        - height
        - bodyGirth
        - measurementUnit
      properties:
        fullName:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 1
        preferredContact:
          type: string
          enum: [email, phone, text]
        waist:
          type: number
          minimum: 0
        bust:
          type: number
          minimum: 0
        hips:
          type: number
          minimum: 0
        height:
          type: number
          minimum: 0
        bodyGirth:
          type: number
          minimum: 0
        measurementUnit:
          type: string
          enum: [inches, cm]
        description:
          type: string
        neededBy:
          type: string
          format: date
    NewOrderResponse:
      type: object
      required:
        - orderNumber
      properties:
        orderNumber:
          type: string
    NewContactRequest:
      type: object
      required:
        - name
        - email
        - message
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
        message:
          type: string
          minLength: 1
    NewContactResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
    ProductVariant:
      type: object
      required:
        - id
        - name
        - available
        - photos
      properties:
        id:
          type: string
        name:
          type: string
        available:
          type: boolean
        price:
          type: number
        description:
          type: string
        photos:
          type: array
          items:
            type: string
        quantityAvailable:
          type: number
    Product:
      type: object
      required:
        - id
        - title
        - category
        - variants
      properties:
        id:
          type: string
        title:
          type: string
        category:
          type: string
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
    ProductList:
      type: object
      required:
        - products
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
