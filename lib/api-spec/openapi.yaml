openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: orders
    description: Customer order status lookup
  - name: contact
    description: Customer contact messages
  - name: products
    description: Shop inventory (ready-to-ship items)
  - name: notify
    description: Back-in-stock notification requests
  - name: checkout
    description: Stripe checkout for ready-to-ship shop items
  - name: appointments
    description: Customer appointment scheduling with atelier staff
paths:
  /health:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /orders/{orderNumber}:
    get:
      operationId: getOrderStatus
      tags: [orders]
      summary: Get order status
      description: Look up a customer's dress order status by order number
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStatus"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderNotFound"
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Submit a new custom dress order
      description: Creates a new custom dress order and saves it to Notion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewOrderRequest"
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewOrderResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /orders/{orderNumber}/deposit:
    post:
      operationId: createOrderDeposit
      tags: [orders]
      summary: Start a deposit payment for a custom order
      description: >-
        Creates a Stripe Checkout session for the deposit the atelier set on
        this custom order (priced server-side from Notion), and returns the
        hosted-checkout URL for the browser to redirect to. Fails if the order
        has no deposit set or the deposit is already paid.
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Deposit checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositSessionResponse"
        "400":
          description: No deposit is due on this order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderNotFound"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /orders/{orderNumber}/measurement-change-requests:
    post:
      operationId: createMeasurementChangeRequest
      tags: [orders]
      summary: Request a change to an order's measurements
      description: >-
        Files a customer's request to change the measurements on an existing
        order. The customer is verified against the email on the order, and the
        request is rejected once the garment has entered production. Accepted
        requests land as a tagged row in the Notion contact-messages inbox for
        the atelier to apply — this endpoint does not itself edit the order.
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewMeasurementChangeRequest"
      responses:
        "201":
          description: Change request received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewMeasurementChangeResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: The email does not match the one on the order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderNotFound"
        "409":
          description: Measurements are locked because the order is in production
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /contact:
    post:
      operationId: createContactMessage
      tags: [contact]
      summary: Submit a contact message
      description: Saves a customer inquiry to the Notion contact-messages database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewContactRequest"
      responses:
        "201":
          description: Message received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewContactResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /notify:
    post:
      operationId: createBackInStockRequest
      tags: [notify]
      summary: Request a back-in-stock notification
      description: >-
        Saves a customer's request to be told when a sold-out shop item is back
        in stock, to the Notion back-in-stock database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewNotifyRequest"
      responses:
        "201":
          description: Request received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewNotifyResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: List shop products
      description: >-
        Returns published, in-stock shop items from the Notion inventory
        database, grouped into cards with selectable variants.
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /checkout:
    post:
      operationId: createCheckoutSession
      tags: [checkout]
      summary: Create a Stripe Checkout session for shop items
      description: >-
        Validates the requested in-stock shop items against live Notion
        inventory, prices them server-side (the client never sends prices), and
        creates a Stripe Checkout session. Returns the hosted-checkout URL for
        the browser to redirect to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutSessionRequest"
      responses:
        "201":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "400":
          description: One or more items are not purchasable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /checkout/session/{sessionId}:
    get:
      operationId: getCheckoutSession
      tags: [checkout]
      summary: Get a checkout session's status
      description: >-
        Returns the payment status of a Stripe Checkout session, used by the
        post-purchase success page to confirm the order.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionStatus"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /appointments/options:
    get:
      operationId: getAppointmentOptions
      tags: [appointments]
      summary: List bookable appointment types
      description: >-
        Returns the appointment types a customer can book — each with its
        duration, the staff who offer it, and the locations it's available in —
        plus the atelier's booking timezone. Drives the booking form's pickers.
      responses:
        "200":
          description: Booking options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentOptions"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /appointments/availability:
    get:
      operationId: getAppointmentAvailability
      tags: [appointments]
      summary: List open appointment slots
      description: >-
        Returns the open start times for the given appointment type, location,
        and (optionally) staff member over a date window, computed from each
        staff member's configured working hours minus their Google Calendar
        free/busy. Slot times are UTC instants to be rendered in the returned
        timezone.
      parameters:
        - name: typeId
          in: query
          required: true
          schema:
            type: string
        - name: location
          in: query
          required: true
          schema:
            type: string
            enum: [in-person, virtual]
        - name: staff
          in: query
          required: false
          description: A specific staff member's name; omit for no preference.
          schema:
            type: string
        - name: from
          in: query
          required: false
          description: >-
            First day of the window as YYYY-MM-DD in the atelier timezone.
            Defaults to today.
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
        - name: days
          in: query
          required: false
          description: Number of days in the window. Defaults to 14.
          schema:
            type: integer
            minimum: 1
            maximum: 60
      responses:
        "200":
          description: Available slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentAvailability"
        "400":
          description: Unknown or unavailable type/location/staff combination
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /appointments:
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Book an appointment
      description: >-
        Books an open slot for a customer. The server re-validates the type,
        location, and staff, re-checks that the slot is still free (all derived
        server-side, never trusting the client), writes the appointment as a
        Google Calendar event (inviting the customer, with a Meet link for
        virtual), and emails a confirmation. Fails if the slot is no longer
        available.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewAppointmentRequest"
      responses:
        "201":
          description: Appointment booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewAppointmentResponse"
        "400":
          description: Validation error or the slot is no longer available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OrderStatus:
      type: object
      properties:
        orderNumber:
          type: string
        orderName:
          type: string
        currentStage:
          type: string
        stages:
          type: array
          items:
            type: string
        depositAmount:
          type: number
          description: >-
            The deposit the atelier set for this custom order, in dollars.
            Absent until they've quoted the piece and set it in Notion.
        depositPaid:
          type: boolean
          description: Whether the customer has already paid the deposit.
        measurementsLocked:
          type: boolean
          description: >-
            True once the garment has reached the production stage at/after which
            measurements are frozen (MEASUREMENT_LOCK_FROM_STAGE). When true, a
            measurement-change request would be rejected, so the UI hides the
            request affordance.
        estimatedCompletion:
          type: string
          description: >-
            The atelier's target completion date for this custom order (the
            order's Due Date), as an ISO date (yyyy-mm-dd). A response
            pass-through, kept as a string (no format: date) so it isn't coerced
            to a Date and reserialized to a UTC timestamp. Absent until the
            atelier sets one in Notion.
        milestones:
          type: array
          description: >-
            Per-stage target completion dates from the Production Schedule,
            present once the order's milestones have been generated. One entry
            per remaining (current + upcoming) stage; completed stages have none.
            Order is not significant — match by stage name.
          items:
            type: object
            required:
              - stage
              - targetDate
            properties:
              stage:
                type: string
              targetDate:
                type: string
                description: >-
                  ISO date (yyyy-mm-dd). A pass-through string (no format: date),
                  same as estimatedCompletion.
      required:
        - orderNumber
        - orderName
        - currentStage
        - stages
        - measurementsLocked
    OrderNotFound:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    NewOrderRequest:
      type: object
      required:
        - fullName
        - email
        - phone
        - preferredContact
      description: >-
        A new custom-dress order. Measurements are optional: the customer either
        supplies all five now (with a measurementUnit), or sets
        measurementAppointment=true to have them taken at a scheduled fitting or
        consultation. The server rejects a body with neither.
      properties:
        fullName:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 1
        preferredContact:
          type: string
          enum: [email, phone, text]
        waist:
          type: number
          minimum: 0
        bust:
          type: number
          minimum: 0
        hips:
          type: number
          minimum: 0
        height:
          type: number
          minimum: 0
        bodyGirth:
          type: number
          minimum: 0
        measurementUnit:
          type: string
          enum: [inches, cm]
        measurementAppointment:
          type: boolean
          description: >-
            True when the customer opted to have their measurements taken at a
            scheduled fitting or consultation instead of entering them now. When
            true the measurement fields are omitted.
        description:
          type: string
        neededBy:
          type: string
          format: date
    NewOrderResponse:
      type: object
      required:
        - orderNumber
      properties:
        orderNumber:
          type: string
    NewMeasurementChangeRequest:
      type: object
      required:
        - email
      description: >-
        A request to change an order's measurements. Like a new order,
        measurements are optional: the customer either supplies all five now
        (with a measurementUnit), or sets measurementAppointment=true to be
        re-measured at a fitting/consultation. The server rejects a request with
        neither.
      properties:
        email:
          type: string
          format: email
          description: >-
            The email to verify against the one on the order. A request whose
            email doesn't match the order is rejected.
        waist:
          type: number
          minimum: 0
        bust:
          type: number
          minimum: 0
        hips:
          type: number
          minimum: 0
        height:
          type: number
          minimum: 0
        bodyGirth:
          type: number
          minimum: 0
        measurementUnit:
          type: string
          enum: [inches, cm]
        measurementAppointment:
          type: boolean
          description: >-
            True when the customer would rather be re-measured at a fitting or
            consultation than enter values now. When true the measurement fields
            are omitted.
        note:
          type: string
          description: Optional free-text note explaining the requested change.
    NewMeasurementChangeResponse:
      type: object
      required:
        - received
      properties:
        received:
          type: boolean
    NewContactRequest:
      type: object
      required:
        - name
        - email
        - message
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
        message:
          type: string
          minLength: 1
    NewContactResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
    NewNotifyRequest:
      type: object
      required:
        - email
        - item
      properties:
        email:
          type: string
          format: email
        item:
          type: string
          minLength: 1
          description: The sold-out variant's name, e.g. "Bow Fleece Soaker — Black".
        size:
          type: string
          description: >-
            Set only when the customer asked about one specific sold-out size
            band; absent when the whole variant is sold out.
    NewNotifyResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
    ProductVariant:
      type: object
      required:
        - id
        - name
        - available
        - photos
        - sizes
      properties:
        id:
          type: string
        name:
          type: string
        available:
          type: boolean
        price:
          type: number
        description:
          type: string
        photos:
          type: array
          items:
            type: string
        sizes:
          type: array
          description: >-
            Every size band this item is offered in ("Sizes Offered" in Notion),
            each flagged with whether it is currently in stock ("Sizes
            Available"). A size that is offered but not available is sold out,
            and the shop offers a per-size back-in-stock request. Empty for
            one-size items (soakers, cloths).
          items:
            $ref: "#/components/schemas/SizeOption"
        quantityAvailable:
          type: number
    SizeOption:
      type: object
      required:
        - name
        - available
      properties:
        name:
          type: string
          description: A size band, e.g. "Adult M".
        available:
          type: boolean
          description: False when the size is offered but currently sold out.
    Product:
      type: object
      required:
        - id
        - title
        - category
        - variants
      properties:
        id:
          type: string
        title:
          type: string
        category:
          type: string
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
    ProductList:
      type: object
      required:
        - products
        - categories
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        categories:
          type: array
          description: >-
            The shop's category filters, read live from the "Item Type" select
            options on the Notion inventory database and returned in the order
            the atelier arranged them. Editing the options in Notion changes
            this list without a redeploy, so clients must not hardcode it.
          items:
            type: string
    CheckoutItem:
      type: object
      required:
        - variantId
        - quantity
      properties:
        variantId:
          type: string
          description: >-
            The Notion inventory page id of the variant being purchased (the
            `id` on a ProductVariant).
        size:
          type: string
          description: >-
            The selected size band, required when the variant is offered in
            sizes and omitted for one-size items.
        quantity:
          type: integer
          minimum: 1
    CreateCheckoutSessionRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CheckoutItem"
    CheckoutSessionResponse:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: The Stripe-hosted checkout URL to redirect the browser to.
    DepositSessionResponse:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: The Stripe-hosted checkout URL for the deposit payment.
    ReceiptLineItem:
      type: object
      required:
        - description
        - quantity
        - amount
      properties:
        description:
          type: string
        quantity:
          type: number
        amount:
          type: number
          description: The line total in dollars (unit price × quantity).
    CheckoutSessionStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: >-
            The Stripe payment status of the session, e.g. "paid", "unpaid", or
            "no_payment_required".
        email:
          type: string
          description: The customer's email, present once the session is complete.
        currency:
          type: string
          description: ISO currency code of the totals, e.g. "usd".
        lineItems:
          type: array
          description: The purchased items, for an on-site receipt.
          items:
            $ref: "#/components/schemas/ReceiptLineItem"
        amountSubtotal:
          type: number
          description: Items subtotal in dollars (before shipping and tax).
        amountShipping:
          type: number
          description: Shipping charged in dollars.
        amountTax:
          type: number
          description: Tax charged in dollars (Stripe Tax).
        amountTotal:
          type: number
          description: Grand total in dollars (items + shipping + tax).
    AppointmentType:
      type: object
      required:
        - id
        - name
        - durationMinutes
        - staff
        - locations
      properties:
        id:
          type: string
        name:
          type: string
        durationMinutes:
          type: integer
          description: How long the appointment runs, in minutes.
        description:
          type: string
        staff:
          type: array
          description: The staff members who offer this appointment type.
          items:
            type: string
        locations:
          type: array
          description: The locations this type is offered in.
          items:
            type: string
            enum: [in-person, virtual]
    AppointmentOptions:
      type: object
      required:
        - timezone
        - types
      properties:
        timezone:
          type: string
          description: >-
            IANA timezone the atelier's hours and slot times are expressed in,
            for the client to render slots and label the times.
        types:
          type: array
          items:
            $ref: "#/components/schemas/AppointmentType"
    AvailabilitySlot:
      type: object
      required:
        - start
        - end
        - staff
      properties:
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        staff:
          type: string
          description: The staff member who would take this slot.
    AppointmentAvailability:
      type: object
      required:
        - timezone
        - slots
      properties:
        timezone:
          type: string
        slots:
          type: array
          items:
            $ref: "#/components/schemas/AvailabilitySlot"
    NewAppointmentRequest:
      type: object
      required:
        - typeId
        - location
        - start
        - fullName
        - email
      properties:
        typeId:
          type: string
        staff:
          type: string
          description: A specific staff member, or omitted for no preference.
        location:
          type: string
          enum: [in-person, virtual]
        start:
          type: string
          format: date-time
          description: >-
            The chosen slot's start instant, as returned by the availability
            endpoint.
        fullName:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
        preferredContact:
          type: string
          enum: [email, phone, text]
        notes:
          type: string
    NewAppointmentResponse:
      type: object
      required:
        - confirmationCode
        - type
        - staff
        - location
        - start
        - end
      properties:
        confirmationCode:
          type: string
        type:
          type: string
          description: The booked appointment type's display name.
        staff:
          type: string
        location:
          type: string
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        meetingUrl:
          type: string
          description: >-
            The Google Meet link for a virtual appointment, when one was created.
        calendarLink:
          type: string
          description: A link to the booking's Google Calendar event.
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
