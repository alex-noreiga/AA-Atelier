openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: orders
    description: Customer order status lookup
  - name: contact
    description: Customer contact messages
  - name: products
    description: Shop inventory (ready-to-ship items)
  - name: notify
    description: Back-in-stock notification requests
paths:
  /health:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /orders/{orderNumber}:
    get:
      operationId: getOrderStatus
      tags: [orders]
      summary: Get order status
      description: Look up a customer's dress order status by order number
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStatus"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderNotFound"
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Submit a new custom dress order
      description: Creates a new custom dress order and saves it to Notion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewOrderRequest"
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewOrderResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /contact:
    post:
      operationId: createContactMessage
      tags: [contact]
      summary: Submit a contact message
      description: Saves a customer inquiry to the Notion contact-messages database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewContactRequest"
      responses:
        "201":
          description: Message received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewContactResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /notify:
    post:
      operationId: createBackInStockRequest
      tags: [notify]
      summary: Request a back-in-stock notification
      description: >-
        Saves a customer's request to be told when a sold-out shop item is back
        in stock, to the Notion back-in-stock database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewNotifyRequest"
      responses:
        "201":
          description: Request received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewNotifyResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: List shop products
      description: >-
        Returns published, in-stock shop items from the Notion inventory
        database, grouped into cards with selectable variants.
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OrderStatus:
      type: object
      properties:
        orderNumber:
          type: string
        orderName:
          type: string
        currentStage:
          type: string
        stages:
          type: array
          items:
            type: string
      required:
        - orderNumber
        - orderName
        - currentStage
        - stages
    OrderNotFound:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    NewOrderRequest:
      type: object
      required:
        - fullName
        - email
        - phone
        - preferredContact
        - waist
        - bust
        - hips
        - height
        - bodyGirth
        - measurementUnit
      properties:
        fullName:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 1
        preferredContact:
          type: string
          enum: [email, phone, text]
        waist:
          type: number
          minimum: 0
        bust:
          type: number
          minimum: 0
        hips:
          type: number
          minimum: 0
        height:
          type: number
          minimum: 0
        bodyGirth:
          type: number
          minimum: 0
        measurementUnit:
          type: string
          enum: [inches, cm]
        description:
          type: string
        neededBy:
          type: string
          format: date
    NewOrderResponse:
      type: object
      required:
        - orderNumber
      properties:
        orderNumber:
          type: string
    NewContactRequest:
      type: object
      required:
        - name
        - email
        - message
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
        message:
          type: string
          minLength: 1
    NewContactResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
    NewNotifyRequest:
      type: object
      required:
        - email
        - item
      properties:
        email:
          type: string
          format: email
        item:
          type: string
          minLength: 1
          description: The sold-out variant's name, e.g. "Bow Fleece Soaker — Black".
        size:
          type: string
          description: >-
            Set only when the customer asked about one specific sold-out size
            band; absent when the whole variant is sold out.
    NewNotifyResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
    ProductVariant:
      type: object
      required:
        - id
        - name
        - available
        - photos
        - sizes
      properties:
        id:
          type: string
        name:
          type: string
        available:
          type: boolean
        price:
          type: number
        description:
          type: string
        photos:
          type: array
          items:
            type: string
        sizes:
          type: array
          description: >-
            Every size band this item is offered in ("Sizes Offered" in Notion),
            each flagged with whether it is currently in stock ("Sizes
            Available"). A size that is offered but not available is sold out,
            and the shop offers a per-size back-in-stock request. Empty for
            one-size items (soakers, cloths).
          items:
            $ref: "#/components/schemas/SizeOption"
        quantityAvailable:
          type: number
    SizeOption:
      type: object
      required:
        - name
        - available
      properties:
        name:
          type: string
          description: A size band, e.g. "Adult M".
        available:
          type: boolean
          description: False when the size is offered but currently sold out.
    Product:
      type: object
      required:
        - id
        - title
        - category
        - variants
      properties:
        id:
          type: string
        title:
          type: string
        category:
          type: string
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
    ProductList:
      type: object
      required:
        - products
        - categories
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        categories:
          type: array
          description: >-
            The shop's category filters, read live from the "Item Type" select
            options on the Notion inventory database and returned in the order
            the atelier arranged them. Editing the options in Notion changes
            this list without a redeploy, so clients must not hardcode it.
          items:
            type: string
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
